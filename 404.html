<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#0E0A06" />
  <title>Not found · AIQ Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #0E0A06; color: #F4ECDD; font-family: "Instrument Serif", serif; overflow: hidden; }
    .wrap { display: grid; place-items: center; min-height: 100vh; padding: 8vw; text-align: center; position: relative; z-index: 2; }
    h1 { font-size: clamp(48px, 8vw, 120px); font-weight: 400; margin: 0; letter-spacing: -0.01em; animation: fade 1.2s ease both; }
    em { font-style: italic; color: #9c8458; }
    p { font-family: "DM Sans", sans-serif; font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase; color: #c4baa2; margin: 24px 0 36px; animation: fade 1.4s ease 0.2s both; }
    a { display: inline-block; padding: 16px 30px; border: 1px solid #9c8458; color: #F4ECDD; text-decoration: none; font-family: "DM Sans", sans-serif; font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase; transition: background 300ms ease, color 300ms ease; animation: fade 1.6s ease 0.4s both; }
    a:hover { background: #9c8458; color: #0E0A06; }
    canvas { position: fixed; inset: 0; z-index: 1; opacity: 0.6; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="wrap">
    <div>
      <h1>Not <em>found</em>.</h1>
      <p>The page does not exist.</p>
      <a href="/Aiq-Studio-A/">Return to the studio</a>
    </div>
  </div>
  <script>
    // Subtle floating dust + a single rotating polyhedron silhouette
    const c = document.getElementById('bg');
    const ctx = c.getContext('2d');
    let w, h, dust = [];
    function size() { c.width = w = innerWidth; c.height = h = innerHeight; }
    size(); addEventListener('resize', size);
    for (let i=0; i<80; i++) dust.push({ x: Math.random()*w, y: Math.random()*h, r: 0.4 + Math.random()*1.4, v: 0.05 + Math.random()*0.15 });
    let t = 0;
    function loop() {
      ctx.fillStyle = 'rgba(14,10,6,0.20)'; ctx.fillRect(0,0,w,h);
      ctx.fillStyle = 'rgba(216,178,126,0.55)';
      for (const d of dust) {
        d.y -= d.v; if (d.y < -2) d.y = h + 2;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
      }
      // central polyhedron silhouette
      const cx = w/2, cy = h/2, R = Math.min(w,h)*0.18;
      t += 0.005;
      ctx.strokeStyle = 'rgba(156,132,88,0.45)';
      ctx.lineWidth = 0.6;
      const pts = [];
      for (let i=0; i<12; i++) {
        const a = (i/12) * Math.PI * 2 + t;
        const x = cx + Math.cos(a) * R * Math.cos(t*0.4);
        const y = cy + Math.sin(a) * R;
        pts.push([x,y]);
      }
      ctx.beginPath();
      pts.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
      ctx.closePath(); ctx.stroke();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
